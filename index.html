<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen AI - Simple Editor</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0514;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Komponen Icon
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); });
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('landing'); // landing, processing, editor
            const [urlInput, setUrlInput] = useState('');
            const [processingStep, setProcessingStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [isExporting, setIsExporting] = useState(false);

            // Simulasi Timeline Berjalan
            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        setCurrentTime((prev) => (prev >= 60 ? 0 : prev + 1));
                    }, 100);
                }
                return () => clearInterval(interval);
            }, [isPlaying]);

            // Simulasi Proses Loading AI
            const handleStartProcessing = (e) => {
                e.preventDefault();
                if (!urlInput) return;
                setView('processing');
                
                let step = 0;
                const interval = setInterval(() => {
                    step++;
                    setProcessingStep(step);
                    if (step > 3) {
                        clearInterval(interval);
                        setTimeout(() => setView('editor'), 500);
                    }
                }, 1000);
            };

            // Simulasi Export
            const handleExport = () => {
                setIsExporting(true);
                setTimeout(() => {
                    setIsExporting(false);
                    alert("Video berhasil di-export dan disimpan ke komputer Anda!");
                    setView('landing');
                    setUrlInput('');
                }, 3000);
            };

            // --- HALAMAN 1: LANDING PAGE ---
            if (view === 'landing') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-950 to-[#0a0514] flex flex-col items-center justify-center p-6 text-center">
                        <div className="max-w-2xl w-full space-y-6">
                            <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight text-white">
                                NexGen <span className="text-purple-500">AI</span>
                            </h1>
                            <p className="text-slate-400 text-lg">Buat Video Shorts Viral Secara Otomatis.</p>

                            <form onSubmit={handleStartProcessing} className="mt-8 flex flex-col md:flex-row gap-4">
                                <div className="flex-1 flex items-center glass-panel rounded-xl p-2 px-4">
                                    <Icon name="link" className="w-5 h-5 text-slate-400 mr-3" />
                                    <input 
                                        type="text" 
                                        placeholder="Paste Link YouTube atau TikTok di sini..."
                                        className="bg-transparent border-none text-white focus:outline-none w-full py-2"
                                        value={urlInput}
                                        onChange={(e) => setUrlInput(e.target.value)}
                                        required
                                    />
                                </div>
                                <button type="submit" className="px-8 py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl transition flex items-center justify-center gap-2">
                                    Generate <Icon name="wand-2" className="w-5 h-5" />
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- HALAMAN 2: LOADING ---
            if (view === 'processing') {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-white">
                        <div className="glass-panel p-10 rounded-2xl text-center max-w-sm w-full">
                            <Icon name="loader-2" className="w-12 h-12 text-purple-500 animate-spin mx-auto mb-6" />
                            <h2 className="text-xl font-bold mb-4">AI Sedang Bekerja...</h2>
                            <div className="text-sm text-slate-400 space-y-2 text-left">
                                <div className={`flex items-center gap-2 ${processingStep >= 1 ? 'text-white' : 'opacity-50'}`}><Icon name="check-circle-2" className="w-4 h-4 text-green-500"/> Download Video</div>
                                <div className={`flex items-center gap-2 ${processingStep >= 2 ? 'text-white' : 'opacity-50'}`}><Icon name="check-circle-2" className="w-4 h-4 text-green-500"/> Mencari Momen Viral</div>
                                <div className={`flex items-center gap-2 ${processingStep >= 3 ? 'text-white' : 'opacity-50'}`}><Icon name="check-circle-2" className="w-4 h-4 text-green-500"/> Membuat Subtitle</div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- HALAMAN 3: EDITOR ---
            return (
                <div className="h-screen flex flex-col bg-slate-950 text-white">
                    {/* Header */}
                    <header className="h-16 glass-panel border-b border-white/10 flex items-center justify-between px-6 shrink-0">
                        <div className="font-bold text-lg flex items-center gap-2">
                            <Icon name="video" className="w-5 h-5 text-purple-500" /> NexGen Simple
                        </div>
                        <button onClick={handleExport} disabled={isExporting} className="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold text-sm transition flex items-center gap-2">
                            {isExporting ? <Icon name="loader-2" className="w-4 h-4 animate-spin"/> : <Icon name="download" className="w-4 h-4"/>}
                            {isExporting ? 'Mengekspor...' : 'Export Video'}
                        </button>
                    </header>

                    {/* Main Area */}
                    <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                        
                        {/* Kiri: Video Preview */}
                        <div className="flex-1 p-6 flex flex-col">
                            <div className="flex-1 bg-black rounded-xl border border-white/10 relative flex items-center justify-center shadow-2xl overflow-hidden">
                                <div className="absolute text-center px-8">
                                    <h2 className="text-3xl md:text-4xl font-black uppercase text-yellow-400 drop-shadow-lg">
                                        INI ADALAH <br/><span className="text-white">CONTOH SUBTITLE</span>
                                    </h2>
                                </div>
                                {/* Tombol Play */}
                                <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex items-center gap-4 glass-panel px-6 py-3 rounded-full border border-white/10 w-2/3 max-w-sm">
                                    <button onClick={() => setIsPlaying(!isPlaying)} className="hover:text-purple-400 transition">
                                        <Icon name={isPlaying ? "pause" : "play"} className="w-6 h-6"/>
                                    </button>
                                    <div className="flex-1 h-2 bg-slate-700 rounded-full">
                                        <div className="h-full bg-purple-500 rounded-full transition-all" style={{ width: `${(currentTime/60)*100}%` }}></div>
                                    </div>
                                    <span className="text-xs font-mono">00:{(currentTime/10).toFixed(1).replace('.','')}</span>
                                </div>
                            </div>
                        </div>

                        {/* Kanan: Simple Settings */}
                        <div className="w-full md:w-80 border-l border-white/10 glass-panel p-6 flex flex-col gap-6 overflow-y-auto">
                            <div>
                                <h3 className="font-bold mb-3 text-sm text-slate-300">Style Subtitle</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    <button className="py-2 bg-purple-600 rounded text-sm font-medium">MrBeast</button>
                                    <button className="py-2 bg-slate-800 hover:bg-slate-700 rounded text-sm">Hormozi</button>
                                    <button className="py-2 bg-slate-800 hover:bg-slate-700 rounded text-sm">Minimal</button>
                                    <button className="py-2 bg-slate-800 hover:bg-slate-700 rounded text-sm">Gaming</button>
                                </div>
                            </div>

                            <div className="space-y-4 pt-4 border-t border-white/10">
                                <div className="flex justify-between items-center text-sm">
                                    <span>Auto Emoji</span>
                                    <input type="checkbox" defaultChecked className="w-4 h-4 accent-purple-500" />
                                </div>
                                <div className="flex justify-between items-center text-sm">
                                    <span>B-Roll Otomatis</span>
                                    <input type="checkbox" defaultChecked className="w-4 h-4 accent-purple-500" />
                                </div>
                                <div className="flex justify-between items-center text-sm">
                                    <span>Hapus Jeda Diam</span>
                                    <input type="checkbox" defaultChecked className="w-4 h-4 accent-purple-500" />
                                </div>
                            </div>

                            <div className="pt-4 border-t border-white/10 mt-auto">
                                <h3 className="font-bold mb-3 text-sm text-slate-300">Durasi Video</h3>
                                <select className="w-full bg-slate-800 border border-white/10 rounded p-2 text-sm focus:outline-none focus:border-purple-500">
                                    <option>Otomatis (Rekomendasi AI)</option>
                                    <option>Maks 30 Detik</option>
                                    <option>Maks 60 Detik</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Bawah: Simple Timeline */}
                    <div className="h-40 border-t border-white/10 glass-panel p-4 flex flex-col gap-2 shrink-0">
                        <div className="text-xs font-bold text-slate-500 mb-1">TIMELINE</div>
                        {/* Track Video */}
                        <div className="h-10 w-full bg-slate-800 rounded border border-white/10 flex items-center px-2">
                            <div className="h-full w-full bg-blue-500/20 border-x border-blue-500 flex items-center justify-center text-xs text-blue-300">
                                <Icon name="video" className="w-4 h-4 mr-2" /> Klip Utama
                            </div>
                        </div>
                        {/* Track Text */}
                        <div className="h-8 w-full bg-slate-900 rounded border border-white/10 flex items-center gap-1 p-1">
                            <div className="h-full w-1/4 bg-yellow-500/20 rounded text-[10px] flex items-center justify-center text-yellow-200">"INI ADALAH"</div>
                            <div className="h-full w-1/4 bg-yellow-500/20 rounded text-[10px] flex items-center justify-center text-yellow-200">"CONTOH SUBTITLE"</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
